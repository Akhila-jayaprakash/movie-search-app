<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1dd7b8" stroke-width="2" style="vertical-align: -6px; margin-right: 8px;">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Movie Search
</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for a movie...">
        <button id="searchBtn">Search</button>
    </div>

    <div id="results"></div>
    <footer>
        Built by <a href="https://github.com/Akhila-jayaprakash" target="_blank">Akhila Jayaprakash</a>
