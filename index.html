<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1dd7b8" stroke-width="2" style="vertical-align: -6px; margin-right: 8px;">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Movie Search
</h1>
<div class="tabs">
    <button class="tab active" id="searchTab">🔍 Search</button>
    <button class="tab" id="favTab">❤️ Favourites</button>
</div>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search for a movie...">
        <button id="searchBtn">Search</button>
    </div>

    <div id="loader" class="loader hidden">
    <div class="spinner"></div>
</div>
<div id="results"></div>
<div id="favourites"></div>
    <footer>
        Built by <a href="https://github.com/Akhila-jayaprakash" target="_blank">Akhila Jayaprakash</a>
    </footer>
    <div id="modal" class="modal-overlay">
    <div class="modal-content">
        <button id="closeModal">✕</button>
        <div class="modal-body">
            <img id="modalPoster" src="" alt="">
            <div class="modal-details">
                <h2 id="modalTitle"></h2>
                <p id="modalGenre" class="modal-tag"></p>
                <div class="modal-meta">
                    <span id="modalYear">📅</span>
                    <span id="modalRuntime">⏱</span>
                    <span id="modalRating">⭐</span>
                </div>
                <p id="modalPlot"></p>
                <p id="modalDirector"></p>
                <p id="modalActors"></p>
            </div>
        </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
